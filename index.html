<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EUNICE — HUD</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;600;900&display=swap');

  :root {
    --gold:    #ffd700;
    --gold2:   #ffb300;
    --gold3:   #ff8c00;
    --amber:   #ffcc44;
    --dark:    #0a0700;
    --panel:   rgba(15,10,0,0.92);
    --border:  rgba(255,215,0,0.25);
    --border2: rgba(255,215,0,0.08);
    --glow:    rgba(255,215,0,0.15);
    --text:    #ffe566;
    --dim:     rgba(255,200,0,0.4);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #000;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    height: 100vh;
    overflow: hidden;
    display: grid;
    grid-template-columns: 260px 1fr 260px;
    grid-template-rows: 56px 1fr 110px;
    gap: 6px;
    padding: 6px;
    background-image:
      radial-gradient(ellipse at 50% 0%, rgba(255,180,0,0.07) 0%, transparent 60%),
      radial-gradient(ellipse at 0% 50%, rgba(255,140,0,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 100% 50%, rgba(255,140,0,0.04) 0%, transparent 50%);
  }

  /* ── HEADER ── */
  header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0 20px;
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .logo {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.5rem;
    font-weight: 900;
    letter-spacing: 12px;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(255,215,0,0.8), 0 0 60px rgba(255,215,0,0.4);
  }

  .header-center {
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 0.7rem;
    letter-spacing: 3px;
    color: var(--dim);
  }

  #conn-status { transition: color 0.3s; color: #ff4444; }
  #conn-status.ok { color: #44ff88; }

  #clock {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 4px;
    text-shadow: 0 0 20px rgba(255,215,0,0.6);
  }

  /* ── PANELS ── */
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    overflow: hidden;
    position: relative;
  }

  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 20px; right: 20px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold2), transparent);
    opacity: 0.6;
  }

  .section-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.5rem;
    letter-spacing: 5px;
    color: var(--gold3);
    text-transform: uppercase;
    border-bottom: 1px solid var(--border2);
    padding-bottom: 5px;
    opacity: 0.8;
  }

  /* ── CAMERA ── */
  #camera-wrap {
    background: #000;
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #cam { width: 100%; height: 100%; object-fit: cover; display: block; }

  #detection-canvas {
    position: absolute; top:0; left:0; width:100%; height:100%;
    pointer-events: none;
  }

  /* Gold scan line */
  #scanline {
    position: absolute; left:0; width:100%; height:2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0.5;
    animation: scan 4s ease-in-out infinite;
  }
  @keyframes scan { 0%{top:0;opacity:0.6} 50%{opacity:0.3} 100%{top:100%;opacity:0.6} }

  /* Corner brackets — gold */
  .corner {
    position: absolute; width: 24px; height: 24px;
    border-color: var(--gold); border-style: solid; opacity: 0.9;
  }
  .corner.tl { top:10px; left:10px; border-width:2px 0 0 2px; }
  .corner.tr { top:10px; right:10px; border-width:2px 2px 0 0; }
  .corner.bl { bottom:10px; left:10px; border-width:0 0 2px 2px; }
  .corner.br { bottom:10px; right:10px; border-width:0 2px 2px 0; }

  #fps-badge {
    position:absolute; top:12px; left:50%; transform:translateX(-50%);
    font-size:0.65rem; letter-spacing:3px;
    background:rgba(0,0,0,0.7); border:1px solid var(--border);
    padding:2px 10px; border-radius:2px; color:var(--amber);
  }

  /* ── RADAR ── */
  #radar-wrap { display:flex; align-items:center; justify-content:center; }
  #radar { width:110px; height:110px; position:relative; }
  .radar-ring {
    position:absolute; border-radius:50%;
    border:1px solid rgba(255,215,0,0.2);
    top:50%; left:50%; transform:translate(-50%,-50%);
  }
  .radar-line {
    position:absolute; width:1px; background:rgba(255,215,0,0.15);
    top:0; bottom:0; left:50%;
  }
  .radar-line.h { width:100%; height:1px; top:50%; left:0; bottom:auto; }
  .radar-sweep {
    position:absolute; width:50%; height:50%;
    top:50%; left:50%; transform-origin:0% 100%;
    background:conic-gradient(from 0deg, transparent 80%, rgba(255,215,0,0.5));
    animation:sweep 3s linear infinite;
    border-radius:0 100% 0 0;
  }
  @keyframes sweep { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .radar-dot {
    position:absolute; width:6px; height:6px; border-radius:50%;
    background:var(--gold); box-shadow:0 0 8px var(--gold);
    top:50%; left:50%; transform:translate(-50%,-50%);
  }

  /* ── STAT BOXES ── */
  .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:5px; }
  .stat-box {
    background:rgba(255,215,0,0.04);
    border:1px solid var(--border2);
    border-radius:2px; padding:6px 8px; text-align:center;
  }
  .stat-box:hover { background:rgba(255,215,0,0.08); border-color:var(--border); transition:0.2s; }
  .stat-val { font-family:'Orbitron',sans-serif; font-size:1rem; color:var(--gold); }
  .stat-lbl { font-size:0.5rem; color:var(--dim); letter-spacing:2px; margin-top:2px; }

  /* ── METERS ── */
  .meter-row { display:flex; align-items:center; gap:6px; font-size:0.65rem; margin:3px 0; }
  .meter-lbl { width:55px; color:var(--dim); font-size:0.6rem; letter-spacing:1px; }
  .meter-track { flex:1; height:3px; background:rgba(255,215,0,0.08); border-radius:2px; overflow:hidden; }
  .meter-fill { height:100%; border-radius:2px; background:linear-gradient(90deg,var(--gold3),var(--gold)); transition:width 0.6s ease; }
  .meter-val { width:34px; text-align:right; color:var(--amber); font-size:0.6rem; }

  /* ── NEURAL BARS ── */
  #neural-bars { display:flex; gap:2px; align-items:flex-end; height:55px; padding:4px 0; }

  /* ── DETECTIONS ── */
  #detection-list { font-size:0.72rem; line-height:1.9; flex:1; overflow-y:auto; }
  #detection-list::-webkit-scrollbar { width:2px; }
  #detection-list::-webkit-scrollbar-thumb { background:var(--border); }
  .det-item {
    display:flex; justify-content:space-between; padding:2px 0;
    border-bottom:1px solid var(--border2);
    animation:fadeIn 0.25s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateX(-6px)} to{opacity:1} }
  .det-label { color:var(--amber); }
  .det-conf  { color:var(--gold); }

  /* ── LOG ── */
  #log-feed { font-size:0.62rem; color:var(--dim); line-height:1.7; flex:1; overflow-y:auto; }
  #log-feed::-webkit-scrollbar { width:2px; }
  #log-feed::-webkit-scrollbar-thumb { background:var(--border2); }
  #log-feed div { border-bottom:1px solid var(--border2); padding:1px 0; }

  /* ── BOTTOM ── */
  #panel-bottom {
    grid-column:1/-1;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:3px;
    padding:0 20px;
    display:flex;
    align-items:center;
    gap:18px;
    overflow:hidden;
    position:relative;
  }

  #panel-bottom::before {
    content:'';
    position:absolute; top:0; left:20px; right:20px; height:1px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);
    opacity:0.5;
  }

  .eunice-badge {
    font-family:'Orbitron',sans-serif;
    font-size:0.65rem; font-weight:600;
    color:#000; background:var(--gold);
    padding:5px 10px; border-radius:2px;
    letter-spacing:3px; white-space:nowrap;
    text-shadow:none;
    box-shadow:0 0 15px rgba(255,215,0,0.5);
  }

  #eunice-text {
    font-size:0.9rem; color:#fff8dc;
    letter-spacing:1px; flex:1;
    overflow:hidden; white-space:nowrap; text-overflow:ellipsis;
  }

  #eunice-cursor {
    display:inline-block; width:8px; height:0.9em;
    background:var(--gold); vertical-align:text-bottom;
    animation:blink 1s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ── PULSE RING (decorative) ── */
  @keyframes pulse-ring {
    0%   { transform:translate(-50%,-50%) scale(0.8); opacity:0.6; }
    100% { transform:translate(-50%,-50%) scale(1.3); opacity:0; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">EUNICE</div>
  <div class="header-center">
    <span id="conn-status">● OFFLINE</span>
    <span id="date-display"></span>
  </div>
  <div id="clock">00:00:00</div>
</header>

<!-- LEFT -->
<div class="panel">
  <div class="section-title">Radar</div>
  <div id="radar-wrap">
    <div id="radar">
      <div class="radar-ring" style="width:28px;height:28px"></div>
      <div class="radar-ring" style="width:56px;height:56px"></div>
      <div class="radar-ring" style="width:84px;height:84px"></div>
      <div class="radar-ring" style="width:110px;height:110px"></div>
      <div class="radar-line"></div>
      <div class="radar-line h"></div>
      <div class="radar-sweep"></div>
      <div class="radar-dot"></div>
    </div>
  </div>

  <div class="section-title">System</div>
  <div class="stat-grid">
    <div class="stat-box"><div class="stat-val" id="fps-stat">--</div><div class="stat-lbl">FPS</div></div>
    <div class="stat-box"><div class="stat-val" id="det-count">0</div><div class="stat-lbl">OBJECTS</div></div>
    <div class="stat-box"><div class="stat-val" id="uptime-stat">00:00</div><div class="stat-lbl">UPTIME</div></div>
    <div class="stat-box"><div class="stat-val" id="frame-stat">0</div><div class="stat-lbl">FRAMES</div></div>
  </div>

  <div class="section-title">Signal</div>
  <div class="meter-row">
    <span class="meter-lbl">VIDEO</span>
    <div class="meter-track"><div class="meter-fill" id="m-video" style="width:0%"></div></div>
    <span class="meter-val" id="mv-val">--</span>
  </div>
  <div class="meter-row">
    <span class="meter-lbl">AI LOAD</span>
    <div class="meter-track"><div class="meter-fill" id="m-ai" style="width:60%"></div></div>
    <span class="meter-val" id="mai-val">60%</span>
  </div>
  <div class="meter-row">
    <span class="meter-lbl">BRIDGE</span>
    <div class="meter-track"><div class="meter-fill" id="m-bridge" style="width:85%"></div></div>
    <span class="meter-val">85%</span>
  </div>
</div>

<!-- CAMERA -->
<div id="camera-wrap">
  <img id="cam" src="" alt=""/>
  <canvas id="detection-canvas"></canvas>
  <div id="scanline"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div id="fps-badge">LIVE ● <span id="fps-live">--</span> FPS</div>
</div>

<!-- RIGHT -->
<div class="panel">
  <div class="section-title">Detections</div>
  <div id="detection-list"><div style="color:rgba(255,200,0,0.25);font-size:0.7rem">Awaiting feed...</div></div>

  <div class="section-title">Neural Activity</div>
  <div id="neural-bars"></div>

  <div class="section-title">Log</div>
  <div id="log-feed"></div>
</div>

<!-- BOTTOM -->
<div id="panel-bottom">
  <div class="eunice-badge">EUNICE</div>
  <div id="eunice-text">System online. Ready.<span id="eunice-cursor"></span></div>
</div>

<script>
const WS_URL = `ws://${location.hostname}:8765`;
let ws, frameCount=0, startTime=Date.now();

// Clock
function tick() {
  const n = new Date();
  document.getElementById('clock').textContent = n.toTimeString().slice(0,8);
  document.getElementById('date-display').textContent =
    n.toLocaleDateString('en-IN',{weekday:'short',day:'2-digit',month:'short',year:'numeric'}).toUpperCase();
  setTimeout(tick,1000);
}
tick();

// Uptime
setInterval(()=>{
  const s=Math.floor((Date.now()-startTime)/1000);
  document.getElementById('uptime-stat').textContent=`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
},1000);

// Neural bars
const neuralWrap = document.getElementById('neural-bars');
const bars=[];
for(let i=0;i<22;i++){
  const b=document.createElement('div');
  b.style.cssText='flex:1;border-radius:2px 2px 0 0;min-height:3px;transition:height 0.12s ease,opacity 0.12s';
  neuralWrap.appendChild(b); bars.push(b);
}
function animBars(){
  bars.forEach((b,i)=>{
    const h=6+Math.random()*49;
    const intensity=Math.random();
    b.style.height=h+'px';
    b.style.opacity=0.4+intensity*0.6;
    b.style.background=intensity>0.7
      ? `linear-gradient(0deg,#ff8c00,#ffd700)`
      : `linear-gradient(0deg,#cc6600,#ffb300)`;
  });
}
setInterval(animBars,100);

// Log
const logEl=document.getElementById('log-feed');
function addLog(msg){
  const t=new Date().toTimeString().slice(0,8);
  const d=document.createElement('div');
  d.textContent=`[${t}] ${msg}`;
  logEl.appendChild(d);
  while(logEl.children.length>30) logEl.removeChild(logEl.firstChild);
  logEl.scrollTop=logEl.scrollHeight;
}
addLog('HUD initialised');
addLog('Connecting to Eunice backend...');

// Typewriter
let typeTimer=null;
function typeText(text){
  const el=document.getElementById('eunice-text');
  if(typeTimer) clearTimeout(typeTimer);
  el.innerHTML='<span id="eunice-cursor"></span>';
  let i=0;
  function t(){
    if(i<text.length){
      el.querySelector('#eunice-cursor').insertAdjacentText('beforebegin',text[i++]);
      typeTimer=setTimeout(t,20);
    }
  }
  t();
}

// Detections
const canvas=document.getElementById('detection-canvas');
const ctx=canvas.getContext('2d');
function drawDetections(dets){
  const w=canvas.offsetWidth,h=canvas.offsetHeight;
  canvas.width=w; canvas.height=h;
  ctx.clearRect(0,0,w,h);
  const detList=document.getElementById('detection-list');
  if(!dets.length){
    detList.innerHTML='<div style="color:rgba(255,200,0,0.25);font-size:0.7rem">No objects detected</div>';
    return;
  }
  detList.innerHTML='';
  dets.forEach(det=>{
    const[x1r,y1r,x2r,y2r]=det.box;
    const x1=x1r*w,y1=y1r*h,x2=x2r*w,y2=y2r*h,bw=x2-x1,bh=y2-y1;
    const col=det.label==='person'?'#ff4444':'#ffd700';

    ctx.shadowColor=col; ctx.shadowBlur=12;
    ctx.strokeStyle=col; ctx.lineWidth=1.5;
    ctx.strokeRect(x1,y1,bw,bh);
    ctx.shadowBlur=0;

    const cs=14; ctx.lineWidth=2.5;
    [[x1,y1,1,1],[x2,y1,-1,1],[x1,y2,1,-1],[x2,y2,-1,-1]].forEach(([cx,cy,dx,dy])=>{
      ctx.beginPath(); ctx.moveTo(cx+dx*cs,cy); ctx.lineTo(cx,cy); ctx.lineTo(cx,cy+dy*cs); ctx.stroke();
    });

    ctx.fillStyle=col; ctx.font='11px Share Tech Mono,monospace';
    ctx.shadowColor=col; ctx.shadowBlur=6;
    ctx.fillText(`${det.label} ${Math.round(det.conf*100)}%`,x1+4,y1-5);
    ctx.shadowBlur=0;

    const item=document.createElement('div');
    item.className='det-item';
    item.innerHTML=`<span class="det-label">${det.label}</span><span class="det-conf">${Math.round(det.conf*100)}%</span>`;
    detList.appendChild(item);
  });
}

// WebSocket
function connect(){
  ws=new WebSocket(WS_URL);
  const statusEl=document.getElementById('conn-status');

  ws.onopen=()=>{
    statusEl.textContent='● ONLINE'; statusEl.className='ok';
    addLog('WebSocket connected');
  };

  ws.onmessage=(e)=>{
    let data; try{data=JSON.parse(e.data)}catch{return}
    if(data.type!=='frame') return;

    document.getElementById('cam').src='data:image/jpeg;base64,'+data.frame;
    frameCount++;

    const fps=data.fps||0;
    document.getElementById('fps-live').textContent=fps;
    document.getElementById('fps-stat').textContent=fps;
    document.getElementById('frame-stat').textContent=frameCount>9999?'9K+':frameCount;
    document.getElementById('m-video').style.width=Math.min(fps/60*100,100)+'%';
    document.getElementById('mv-val').textContent=fps+' fps';

    const dets=data.detections||[];
    document.getElementById('det-count').textContent=dets.length;
    drawDetections(dets);

    if(data.eunice&&data.eunice.trim()){
      typeText(data.eunice);
      addLog('EUNICE: '+data.eunice.slice(0,60));
    }
  };

  ws.onclose=()=>{
    statusEl.textContent='● OFFLINE'; statusEl.className='';
    addLog('Connection lost — retrying...');
    setTimeout(connect,2000);
  };

  ws.onerror=()=>ws.close();
}
connect();

// AI load animation
setInterval(()=>{
  const v=40+Math.random()*45;
  document.getElementById('m-ai').style.width=v+'%';
  document.getElementById('mai-val').textContent=Math.round(v)+'%';
},2500);
</script>
</body>
</html>
